name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1"  # todos los lunes a las 9am UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias (decrypt.py)
        run: pip install -r requirements.txt

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Auditar vulnerabilidades
        run: pip-audit